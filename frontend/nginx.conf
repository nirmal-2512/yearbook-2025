server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # The app is built with base=/yearbook/ so all assets are at /yearbook/...
    # This single location handles everything and falls back to index.html
    # for client-side routing (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache the HTML entry point
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}